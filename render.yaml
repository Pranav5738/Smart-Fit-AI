databases:
  - name: smart-fit-ai-db
    databaseName: smartfit_ai
    user: smartfit_ai_user
    plan: free

services:
  - type: web
    name: smart-fit-ai-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-fit-ai-db
          property: connectionString
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["*"]'