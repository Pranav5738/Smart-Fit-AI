<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="logoFullTitle logoFullDesc">
  <title id="logoFullTitle">SmartFit AI Logo</title>
  <desc id="logoFullDesc">SmartFit AI full logo with mark, wordmark and tagline.</desc>
  <defs>
    <linearGradient id="fullBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3f63"/>
      <stop offset="1" stop-color="#3f6380"/>
    </linearGradient>
  </defs>
  <rect width="900" height="900" fill="url(#fullBg)"/>

  <rect x="250" y="80" width="400" height="400" fill="none" stroke="#f8fafc" stroke-width="6"/>
  <line x1="398" y1="330" x2="510" y2="232" stroke="#f8fafc" stroke-width="8" stroke-linecap="round"/>
  <text x="348" y="286" fill="#f8fafc" font-size="132" font-family="Georgia, 'Times New Roman', serif" font-weight="600">S</text>
  <text x="515" y="418" fill="#f8fafc" font-size="132" font-family="Georgia, 'Times New Roman', serif" font-weight="600">F</text>

  <text x="450" y="690" fill="#f8fafc" text-anchor="middle" font-size="126" font-family="Georgia, 'Times New Roman', serif" font-weight="500">SmartFit AI</text>
  <line x1="160" y1="742" x2="740" y2="742" stroke="#f8fafc" stroke-width="6"/>
  <text x="450" y="846" fill="#f8fafc" text-anchor="middle" font-size="58" letter-spacing="9" font-family="Arial, Helvetica, sans-serif">AI POWERED SIZE INTELLIGENCE</text>
</svg>
