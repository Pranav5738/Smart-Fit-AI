<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="logoMarkTitle logoMarkDesc">
  <title id="logoMarkTitle">SmartFit AI Mark</title>
  <desc id="logoMarkDesc">Stylized S and F letters separated by a diagonal line inside a square.</desc>
  <defs>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f3f63"/>
      <stop offset="1" stop-color="#3f6380"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#markBg)"/>
  <rect x="42" y="30" width="172" height="172" fill="none" stroke="#f8fafc" stroke-width="4"/>
  <line x1="110" y1="150" x2="156" y2="106" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
  <text x="93" y="113" fill="#f8fafc" font-size="76" font-family="Georgia, 'Times New Roman', serif" font-weight="600">S</text>
  <text x="145" y="185" fill="#f8fafc" font-size="76" font-family="Georgia, 'Times New Roman', serif" font-weight="600">F</text>
</svg>
